name: Build Upscaler Serverless

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Free ~50GB by removing pre-installed SDKs (needed for 39GB+ image)
      - name: Free disk space
        run: |
          echo "=== BEFORE cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet            # ~6GB
          sudo rm -rf /usr/local/lib/android        # ~10GB
          sudo rm -rf /opt/ghc                      # ~2GB
          sudo rm -rf /opt/hostedtoolcache          # ~5GB
          sudo rm -rf /usr/local/share/boost        # ~2GB
          sudo rm -rf /usr/share/swift              # ~2GB
          sudo rm -rf /usr/local/graalvm            # ~1.3GB
          sudo rm -rf /usr/local/.ghcup             # ~3GB
          sudo rm -rf /opt/pipx                     # ~1GB
          sudo rm -rf /usr/local/sqlpackage         # ~0.5GB
          sudo rm -rf /usr/share/az_*               # ~1GB
          sudo rm -rf /usr/share/miniconda          # ~0.5GB
          sudo rm -rf /usr/local/share/powershell   # ~0.5GB
          sudo docker image prune -af
          sudo apt-get clean
          echo "=== AFTER cleanup ==="
          df -h /

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/comfyui-upscaler-serverless:latest
          build-args: |
            CIVITAI_TOKEN=${{ secrets.CIVITAI_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
